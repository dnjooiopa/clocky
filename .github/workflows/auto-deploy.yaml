name: Auto Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

env:
  IMAGE_NAME_LATEST: ghcr.io/dnjooiopa/clocky:latest
  IMAGE_NAME: ghcr.io/dnjooiopa/clocky:${{ github.sha }}

jobs:
  build_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          context: .
          file: Dockerfile
          tags: ${{ env.IMAGE_NAME_LATEST }},${{ env.IMAGE_NAME }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}

  deploy:
    needs: build_image
    runs-on: self-hosted
    environment: production
    steps:
      - name: deploy service
        run: |
          set -e
          echo "Deploying..."
          docker pull ${{ env.IMAGE_NAME }}
          docker stop clocky || true
          docker rm clocky || true
          docker run -d --name clocky -p 7717:80 --restart unless-stopped ${{ env.IMAGE_NAME }}
